<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cast Hello World Receiver</title>
    <style>
      :root {
        color: #f9fafb;
        background: #111827;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        text-align: center;
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 64px;
      }

      p {
        margin: 0;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>Custom Web Receiver is running.</p>
    </main>

    <script
      src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"
    ></script>
    <script>
      const context = cast.framework.CastReceiverContext.getInstance();
      const options = new cast.framework.CastReceiverOptions();
      context.start(options);
    </script>
  </body>
</html>
