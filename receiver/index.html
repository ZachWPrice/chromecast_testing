<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cast Hello World Receiver</title>
    <style>
      :root {
        color: #f9fafb;
        background: #111827;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        text-align: center;
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 64px;
      }

      p {
        margin: 0;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>Custom Web Receiver is running.</p>
    </main>

    <script
      src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"
    ></script>
    <script>
      const CUSTOM_NAMESPACE = 'urn:x-cast:com.zachwprice.chromecast';
      const headingEl = document.querySelector('h1');

      function isValidHexColor(color) {
        return typeof color === 'string' && /^#[0-9A-Fa-f]{6}$/.test(color);
      }

      function textColorForBackground(hexColor) {
        const r = parseInt(hexColor.slice(1, 3), 16);
        const g = parseInt(hexColor.slice(3, 5), 16);
        const b = parseInt(hexColor.slice(5, 7), 16);
        const luma = 0.299 * r + 0.587 * g + 0.114 * b;
        return luma > 186 ? '#111827' : '#F9FAFB';
      }

      const context = cast.framework.CastReceiverContext.getInstance();
      const options = new cast.framework.CastReceiverOptions();
      options.customNamespaces = {
        [CUSTOM_NAMESPACE]: cast.framework.system.MessageType.JSON,
      };

      context.addCustomMessageListener(CUSTOM_NAMESPACE, (event) => {
        const data = event.data;
        if (!data || data.type !== 'SET_BACKGROUND_COLOR' || !isValidHexColor(data.color)) {
          return;
        }

        const color = data.color.toUpperCase();
        const textColor = textColorForBackground(color);
        document.documentElement.style.backgroundColor = color;
        document.documentElement.style.color = textColor;
        document.body.style.backgroundColor = color;
        document.body.style.color = textColor;
        if (headingEl) {
          headingEl.textContent = color;
        }
      });

      context.start(options);
    </script>
  </body>
</html>
